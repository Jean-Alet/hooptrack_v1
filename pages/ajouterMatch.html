<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ajouter match</title>
    <link rel="sylesheet" href="../css/style.css">
</head>
<body>

<h2>Ajouter un match</h2>

<form method="post" action="../core/ajoutmatch.php">

    Date et heure :
    <input type="datetime-local" name="date_match" required><br>

    Équipe adverse :
    <input type="text" name="equipe_adverse" required><br>

    Lieu :
    <select name="lieu">
        <option>Domicile</option>
        <option>Extérieur</option>
    </select><br>

    Résultat :
    <select name="resultat">
        <option value="">--</option>
        <option>Victoire</option>
        <option>Défaite</option>
    </select><br>

    <input type="submit" value="Ajouter">
</form>

<form action="match.php" method="get">
    <button type="submit">Retour</button>
</form>

</body>
</html>
